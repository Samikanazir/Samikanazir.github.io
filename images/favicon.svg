<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="cocoon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0e6c8"/>
      <stop offset="100%" stop-color="#d4b896"/>
    </linearGradient>
    <linearGradient id="silk" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#e8d5b0"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Mulberry leaf (bottom left, subtle) -->
  <path d="M4 24 Q6 18 10 20 Q8 26 4 24Z" fill="url(#leaf)" opacity="0.7"/>
  <line x1="7" y1="22" x2="9" y2="25" stroke="#16a34a" stroke-width="0.5" opacity="0.8"/>

  <!-- Cocoon body (central, elegant oval) -->
  <ellipse cx="17" cy="16" rx="8" ry="5.5" fill="url(#cocoon)" opacity="0.95"/>

  <!-- Silk thread wrapping lines on cocoon -->
  <path d="M10 14 Q17 11 24 14" fill="none" stroke="url(#silk)" stroke-width="0.8" opacity="0.8"/>
  <path d="M10 16 Q17 13 24 16" fill="none" stroke="url(#silk)" stroke-width="0.8" opacity="0.7"/>
  <path d="M10 18 Q17 15 24 18" fill="none" stroke="url(#silk)" stroke-width="0.8" opacity="0.6"/>
  <path d="M11 20 Q17 17 23 20" fill="none" stroke="url(#silk)" stroke-width="0.7" opacity="0.5"/>

  <!-- Cocoon highlight sheen -->
  <ellipse cx="14" cy="14" rx="3.5" ry="2" fill="white" opacity="0.2" transform="rotate(-15,14,14)"/>

  <!-- Silk thread unraveling (top right) -->
  <path d="M25 10 Q28 8 28 5" fill="none" stroke="#e8d5b0" stroke-width="0.9" opacity="0.8" stroke-linecap="round"/>
  <circle cx="28" cy="5" r="1.2" fill="#e8d5b0" opacity="0.9"/>

  <!-- Tiny worm peeking (right end of cocoon) -->
  <ellipse cx="25" cy="16" rx="1.5" ry="1.2" fill="#c4a882"/>
  <circle cx="26.2" cy="15.5" r="0.4" fill="#2d1b00" opacity="0.8"/>
</svg>
